[agent]
  interval = "10s"
  round_interval = true

[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto-broker:1883"]
  topics = ["sensors/#"]
  data_format = "json"
  tag_keys = ["sensor_id", "location"]
  json_string_fields = ["temperature"]

[[outputs.postgresql]]
  connection = "host=timescaledb user=postgres password=admin dbname=iot_data sslmode=disable"
  create_templates = [
    "CREATE EXTENSION IF NOT EXISTS timescaledb CASCADE;",
    "SELECT create_hypertable('{{.table}}', 'time', if_not_exists => TRUE);",
  ]
